<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Andá — Shop the Drop</title>
  <meta name="description" content="Andá surf, skate and culture.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <img class="logo" src="assets/anda-logo.png" alt="Andá">
      <p class="tagline">SURF · SKATE · CULTURE</p>
      <a class="button" href="#shop">SHOP THE DROP</a>

  <main>
    <section id="shop" class="shop">
      <div class="section-title">
        <h1>SHOP</h1>
        <span></span>
      </div>

      <div class="products">
        <article class="product">
          <img src="assets/gaucho-tee.jpg" alt="Gaucho Tee">
          <h2>GAUCHO TEE</h2>
          <p>$35.00</p>
          <a class="button small" href="https://example.com" target="_blank" rel="noopener">BUY NOW</a>
        </article>

        <article class="product">
          <img src="assets/tie-dye-tee.jpg" alt="Skate Tie Dye Tee">
          <h2>SKATE TIE DYE TEE</h2>
          <p>$40.00</p>
          <a class="button small" href="https://example.com" target="_blank" rel="noopener">BUY NOW</a>
        </article>

        <article class="product">
          <img src="assets/anda-hat.jpg" alt="Andá Surf Co. Hat">
          <h2>ANDÁ SURF CO. HAT</h2>
          <p>$30.00</p>
          <a class="button small" href="https://example.com" target="_blank" rel="noopener">BUY NOW</a>
        </article>

        <article class="product">
          <img src="assets/sticker-pack.jpg" alt="Andá Sticker Pack">
          <h2>ANDÁ STICKER PACK</h2>
          <p>$10.00</p>
          <a class="button small" href="https://example.com" target="_blank" rel="noopener">BUY NOW</a>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <p class="footer-script">Andá tu camino.</p>
      <div class="socials">
        <a href="#" aria-label="Instagram">◎</a>
        <a href="#" aria-label="TikTok">♪</a>
        <a href="mailto:hello@example.com" aria-label="Email">✉</a>
      </div>
    </div>
  </footer>
</body>
</html>
